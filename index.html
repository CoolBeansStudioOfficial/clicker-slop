<!DOCTYPE HTML>
<body>
    <link rel="stylesheet" href="style.css" />
    <script defer src="script.js"></script>
    <div id="background" class="background"></div>
    <div class="vbox">
        <div class="buttons">
            <p id="counter" class="counter">Cookies: 0</p>
            <p id="multiplier">Multiplier: 1x</p>
            <button id="upgrade" class="upgrade">Upgrade to 2x: 10 cookies</button>

            <p id="rebirthDisplay" class="rebirthDisplay" hidden>Rebirth 1</p>
            <button id="rebirth" class="upgrade-ready" hidden>Rebirth</button>
        </div>
        <img id="cookie" draggable="false" class="cookie selector" src="golden.png"></img>
        <div id="cookies" class="cookies"></div>
    </div>
    
    

    
</body>
