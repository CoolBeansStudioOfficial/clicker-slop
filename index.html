<!DOCTYPE HTML>
<html id="html">
<head>
    <title>Cookie Tycoon</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <link rel="stylesheet" href="style.css" />

    <script src="js/audio.js" type="module"></script>
    <script defer src="js/ui.js" type="module"></script>
    <script defer src="js/game.js" type="module"></script>
    <script defer src="js/powerups.js" type="module"></script>

    <div class="spaced vbox">
        <div class="spaced hbox">
            <p id="counter" class="counter">Cookies: 0</p>

            <p id="rebirthDisplay" class="rebirthDisplay" hidden>Rebirth 1</p>
            <button id="rebirth" class="button-ready" hidden>Rebirth</button>
        </div>
        <div class="shop hbox spaced">
            <button id="upgrade" class="button">Upgrade CPC to 2:<br>10 cookies</button>
            <button id="autoclick" class="button">Unlock autoclick:<br>500 cookies</button>
            <button id="crumbs" class="button">Unlock crumbs:<br>5 thousand cookies</button>
        </div>
        <button id="cookie" draggable="false" class="cookie selector"></button>
        <p id="multiplier">Cookies Per Click (CPC): 1</p>
        <div id="cookies" class="cookies"></div>
    </div>
    <button id="crumb" class="crumb" hidden></button>
</body>
</html>
